name: "Setup Workspace Environment"
description: "Sets up a Node.js environment and installs dependencies"

inputs:
  node_version:
    description: "Node.js version to use"
    required: false
    # TODO: Keep this in sync with .nvmrc until pnpm/setup can read it via
    # https://github.com/jasongin/nvs/pull/315.
    default: "24"
  install:
    description: "Whether to install dependencies"
    required: false
    default: "true"
  build:
    description: "Whether to build the project"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup pnpm and Node.js
      uses: pnpm/setup@f7d0e5f4b1b3089d2799ef9722859e7ba314c4c8 # v1
      with:
        # TODO: pnpm/setup does not read .nvmrc yet; use the input default above for now.
        # pnpm/setup installs runtimes via pnpm runtime, which requires pnpm >=11.1.0.
        version: 11.7.0
        runtime: node@${{ inputs.node_version }}
        cache: false
        install: false

    # Ensure latest npm with OIDC support (npm 11.5.1+)
    - name: Ensure modern npm (OIDC support)
      shell: bash
      run: npm install -g npm@11.6.4

    - name: Install package.json dependencies with pnpm
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Build project with pnpm
      if: ${{ inputs.build == 'true' }}
      shell: bash
      run: pnpm build
