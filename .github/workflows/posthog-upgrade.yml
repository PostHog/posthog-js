name: 'PostHog Upgrade'

on:
    workflow_dispatch:
        inputs:
            package_name:
                type: choice
                description: 'Package name to upgrade'
                required: true
                options:
                    - posthog-js
            package_version:
                description: 'Package version to upgrade to'
                required: true
                type: string

permissions:
    contents: read

jobs:
    posthog-upgrade:
        name: Upgrade PostHog Package
        runs-on: ubuntu-latest

        steps:
            - name: Get upgrader token
              id: upgrader
              uses: getsentry/action-github-app-token@97c9e23528286821f97fba885c1b1123284b29cc # v2.0.0
              with:
                  app_id: ${{ secrets.GH_APP_POSTHOG_JS_UPGRADER_APP_ID }}
                  private_key: ${{ secrets.GH_APP_POSTHOG_JS_UPGRADER_PRIVATE_KEY }}

            - name: Check out main repo
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  repository: 'PostHog/posthog'
                  token: ${{ steps.upgrader.outputs.token }}

            - name: Setup Node.js
              uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
              with:
                node-version: 24

            - name: Setup pnpm
              uses: pnpm/setup@f7d0e5f4b1b3089d2799ef9722859e7ba314c4c8 # v1
              with:
                cache: false
                install: false

            - name: Install new package version in main repo
              id: pnpm-upgrade
              shell: bash
              env:
                  PACKAGE_NAME: ${{ github.event.inputs.package_name }}
                  PACKAGE_VERSION: ${{ github.event.inputs.package_version }}
              run: |
                  sed -i "s|${PACKAGE_NAME}:.*|${PACKAGE_NAME}: ^${PACKAGE_VERSION}|" pnpm-workspace.yaml
                  pnpm i --no-frozen-lockfile

            - name: Generate pull request details
              id: generate-pr-details
              shell: bash
              env:
                  GH_TOKEN: ${{ steps.upgrader.outputs.token }}
                  PACKAGE_NAME: ${{ github.event.inputs.package_name }}
                  PACKAGE_VERSION: ${{ github.event.inputs.package_version }}
              run: |
                  PACKAGE_NAME_SANITIZED=$(echo "$PACKAGE_NAME" | sed 's/@//g' | sed 's/\//-/g')
                  TITLE_PREFIX="chore(deps): Update ${PACKAGE_NAME} to "
                  PR_TITLE="${TITLE_PREFIX}${PACKAGE_VERSION}"
                  EXISTING_BRANCH=$(gh pr list \
                      --repo PostHog/posthog \
                      --state open \
                      --limit 100 \
                      --json title,headRefName,headRepositoryOwner \
                      --jq ".[] | select(.title | startswith(\"${TITLE_PREFIX}\")) | select(.headRepositoryOwner.login == \"PostHog\") | .headRefName" | head -n 1)

                  if [ -n "$EXISTING_BRANCH" ]; then
                      BRANCH_NAME="$EXISTING_BRANCH"
                  else
                      BRANCH_NAME="${PACKAGE_NAME_SANITIZED}-upgrade"
                  fi

                  echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
                  echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"
                  {
                      echo 'body<<EOF'
                      echo '## Changes'
                      echo
                      echo "$PACKAGE_NAME version $PACKAGE_VERSION has been released. This updates PostHog to use it."
                      echo
                      echo "[GitHub releases](https://github.com/PostHog/posthog-js/releases) • [npm releases](https://www.npmjs.com/package/${PACKAGE_NAME}?activeTab=version)"
                      echo 'EOF'
                  } >> "$GITHUB_OUTPUT"

            - name: Create main repo pull request
              id: main-repo-pr
              uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725 # v8.0.0
              env:
                  HUSKY: '0'
              with:
                  token: ${{ steps.upgrader.outputs.token }}
                  commit-message: ${{ steps.generate-pr-details.outputs.title }}
                  branch: ${{ steps.generate-pr-details.outputs.branch_name }}
                  delete-branch: true
                  title: ${{ steps.generate-pr-details.outputs.title }}
                  body: ${{ steps.generate-pr-details.outputs.body }}

            - name: Output pull request result
              shell: bash
              env:
                  PACKAGE_NAME: ${{ github.event.inputs.package_name }}
                  PACKAGE_VERSION: ${{ github.event.inputs.package_version }}
                  PR_URL: ${{ steps.main-repo-pr.outputs.pull-request-url }}
              run: |
                  echo "PostHog pull request for $PACKAGE_NAME version $PACKAGE_VERSION ready: $PR_URL"

            - name: Update pull request metadata
              env:
                  GH_TOKEN: ${{ steps.upgrader.outputs.token }}
                  PR_BODY: ${{ steps.generate-pr-details.outputs.body }}
                  PR_NUMBER: ${{ steps.main-repo-pr.outputs.pull-request-number }}
                  PR_TITLE: ${{ steps.generate-pr-details.outputs.title }}
              run: |
                  gh pr edit "$PR_NUMBER" \
                      --repo PostHog/posthog \
                      --title "$PR_TITLE" \
                      --body "$PR_BODY"

            - name: Enable automerge
              env:
                  GH_TOKEN: ${{ steps.upgrader.outputs.token }}
                  PR_NUMBER: ${{ steps.main-repo-pr.outputs.pull-request-number }}
              run: |
                  if [ "$(gh pr view "$PR_NUMBER" --repo PostHog/posthog --json autoMergeRequest --jq '.autoMergeRequest != null')" = "false" ]; then
                      gh pr merge "$PR_NUMBER" --repo PostHog/posthog --auto --squash
                  fi

            - name: Assign reviewers
              env:
                  GH_TOKEN: ${{ steps.upgrader.outputs.token }}
                  PR_NUMBER: ${{ steps.main-repo-pr.outputs.pull-request-number }}
              run: |
                  gh pr edit "$PR_NUMBER" --repo PostHog/posthog --add-reviewer PostHog/client-libraries-approvers --add-reviewer PostHog/team-client-libraries

            # This job runs after posthog-js is already published; it only opens the
            # dependency-bump PR in the PostHog/posthog monorepo. A failure here means
            # the upgrade PR could not be opened, not that the release failed. It records
            # its own analytics event and posts an accurate alert rather than a
            # "Failed to release" one.
            - name: Send failure event to PostHog
              if: ${{ failure() }}
              continue-on-error: true
              uses: PostHog/posthog-github-action@58dea254b598fb5d469c0699c98af8288a7f7650 # v1.2.0
              with:
                  posthog-token: '${{ secrets.POSTHOG_PROJECT_API_KEY }}'
                  # Distinct from release.yml's event name so the release-failure CDP
                  # alert does not fire for an upgrade-PR failure.
                  event: 'posthog-js-github-upgrade-pr-failure'
                  properties: >-
                      {
                        "commitSha": "${{ github.sha }}",
                        "jobStatus": "${{ job.status }}",
                        "ref": "${{ github.ref }}",
                        "repository": "PostHog/posthog",
                        "packageName": "${{ github.event.inputs.package_name }}",
                        "packageVersion": "${{ github.event.inputs.package_version }}",
                        "actionUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }

            - name: Notify Slack that the upgrade PR failed
              if: ${{ failure() }}
              # #alerts-posthog-js; override with a repo var when one exists.
              uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
              with:
                  method: chat.postMessage
                  token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
                  payload: |
                      {
                        "channel": "${{ vars.SLACK_ALERTS_POSTHOG_JS_CHANNEL_ID || 'C07HTMN9X47' }}",
                        "text": ":warning: The PostHog/posthog dependency bump for `${{ github.event.inputs.package_name }}@${{ github.event.inputs.package_version }}` failed — this is the downstream monorepo upgrade, not the posthog-js release. <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                      }
