name: Browser SDK Compliance Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/browser/**'
      - 'packages/core/**'
      - 'compliance/browser/**'
      - '.github/workflows/sdk-compliance-tests-browser.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/browser/**'
      - 'packages/core/**'
      - 'compliance/browser/**'
      - '.github/workflows/sdk-compliance-tests-browser.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pull-requests: write

jobs:
  test-browser-sdk:
    uses: PostHog/posthog-sdk-test-harness/.github/workflows/test-sdk-action.yml@be8b8d5a3f94a249659844e94832e874f049c1e4
    with:
      adapter-dockerfile: compliance/browser/Dockerfile
      adapter-context: .
      test-harness-version: "0.8.0"
      report-name: browser-sdk-compliance-report
