name: Browser SDK Compliance Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'packages/browser/**'
      - 'packages/core/**'
      - 'compliance/browser/**'
      - '.github/workflows/sdk-compliance-tests-browser.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'packages/browser/**'
      - 'packages/core/**'
      - 'compliance/browser/**'
      - '.github/workflows/sdk-compliance-tests-browser.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pull-requests: write

jobs:
  test-browser-sdk:
    uses: PostHog/posthog-sdk-test-harness/.github/workflows/test-sdk-action.yml@39d05346c4638d24f94e591ab89c9c6fcdb52d6b
    with:
      adapter-dockerfile: compliance/browser/Dockerfile
      adapter-context: .
      test-harness-version: latest
      report-name: browser-sdk-compliance-report
