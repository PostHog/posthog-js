name: Generated files notice

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/*/references/**'
      - 'packages/**/CHANGELOG.md'
      - 'packages/**/_generated/**'
      - 'examples/**/_generated/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  warn-on-generated-file-edits:
    name: Warn on edits to auto-generated files
    runs-on: ubuntu-22.04
    # Bots that legitimately update these files (release bot, the
    # generate-references App, dependabot, etc.) don't need the notice.
    if: ${{ !endsWith(github.event.pull_request.user.login, '[bot]') }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Warn about edits to auto-generated files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          MATCHING_PATHS_FILE=$(mktemp)
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- \
            ':(glob)packages/*/references/*-references-latest.json' \
            ':(glob)packages/*/references/*-references-[0-9]*.json' \
            ':(glob)packages/**/CHANGELOG.md' \
            ':(glob)packages/**/_generated/**' \
            ':(glob)examples/**/_generated/**' \
            > "$MATCHING_PATHS_FILE"

          if [[ ! -s "$MATCHING_PATHS_FILE" ]]; then
            echo "No changed paths matched the generated-file patterns."
            exit 0
          fi

          mapfile -t MATCHING_PATHS < "$MATCHING_PATHS_FILE"
          WARNING_MESSAGE="This PR modifies files that are typically managed by tooling, not hand-edited:"
          for path in "${MATCHING_PATHS[@]}"; do
            WARNING_MESSAGE+="%0A- $path"
          done
          echo "::warning title=Editing auto-generated files — is this intentional?::$WARNING_MESSAGE"

          cat <<'EOF'

          Heads up — please confirm you actually meant to edit these
          auto-generated paths:
          EOF
          printf '  * %s\n' "${MATCHING_PATHS[@]}"
          cat <<'EOF'

          Reference JSON files are api-extractor output. Latest references are
          updated by the "Generate References" workflow
          (.github/workflows/generate-references.yml), while versioned references
          are updated by the release workflow.

          CHANGELOG.md files are Changesets output, updated by the release bot's
          "chore: update versions and lockfile" commits.

          Files in _generated directories are Convex codegen output, regenerated
          by `npx convex codegen`.

          If these changes were accidental (e.g. left over from a local
          generate / codegen run), remove them with:

              git checkout origin/main -- <the-affected-path>
              git commit -m "Drop generated file changes"
              git push

          Legitimate reasons to edit them by hand include:
            - Adding a new package (initial CHANGELOG.md scaffold)
            - A manual security note in a CHANGELOG.md
            - Convex schema change that requires committed codegen output

          If you meant to commit them, you can safely ignore this
          warning — it does not fail the workflow and does not block
          merge.
          EOF
