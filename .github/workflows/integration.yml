name: Playwright Integration Tests
on: [pull_request]
env:
  POSTHOG_PROJECT_API_KEY: "${{ secrets.POSTHOG_PROJECT_API_KEY }}"
  POSTHOG_PERSONAL_API_KEY: "${{ secrets.POSTHOG_PERSONAL_API_KEY }}"
  POSTHOG_API_HOST: https://us.i.posthog.com
  POSTHOG_PROJECT_ID: 11213

permissions:
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-22.04
    outputs:
      is-affected: ${{ steps.is-affected.outputs.is-affected }}
      playwright-version: ${{ steps.playwright-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          build: false

      - uses: ./.github/actions/is-affected
        id: is-affected
        with:
          package-name: posthog-js

      - name: Restore Turbo cache
        if: steps.is-affected.outputs.is-affected == 'true'
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-integration-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-integration-

      - name: Build packages
        if: steps.is-affected.outputs.is-affected == 'true'
        run: pnpm build

      - name: Get Playwright version
        if: steps.is-affected.outputs.is-affected == 'true'
        id: playwright-version
        shell: bash
        run: echo "version=$(pnpm exec playwright --version)" >> $GITHUB_OUTPUT
        working-directory: packages/browser

      - name: Cache Playwright browsers
        if: steps.is-affected.outputs.is-affected == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-all-${{ steps.playwright-version.outputs.version }}

      - name: Install all Playwright browsers
        if: steps.is-affected.outputs.is-affected == 'true'
        run: pnpm exec playwright install chromium firefox webkit --only-shell
        working-directory: packages/browser

  browsers:
    name: Test on ${{ matrix.tests.name }}
    runs-on: ubuntu-22.04
    needs: setup

    strategy:
      fail-fast: false
      matrix:
        tests:
          - name: Chromium
            project: "chromium"
            install: "chromium"

          - name: Firefox
            project: "firefox"
            install: "firefox"

          - name: Safari
            project: "webkit"
            install: "webkit"

          - name: Edge
            project: "msedge"
            install: "chromium"

    steps:
      - uses: actions/checkout@v4
        if: needs.setup.outputs.is-affected == 'true'

      - uses: ./.github/actions/setup
        if: needs.setup.outputs.is-affected == 'true'
        with:
          build: false

      - name: Restore Turbo cache
        if: needs.setup.outputs.is-affected == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .turbo/cache
          key: turbo-integration-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-integration-

      - name: Build packages
        if: needs.setup.outputs.is-affected == 'true'
        run: pnpm build

      - name: Restore Playwright browsers
        if: needs.setup.outputs.is-affected == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-all-${{ needs.setup.outputs.playwright-version }}

      - name: Install Playwright system dependencies
        if: needs.setup.outputs.is-affected == 'true'
        run: pnpm exec playwright install-deps ${{ matrix.tests.install }}
        working-directory: packages/browser

      - name: Run ${{ matrix.tests.name }} test
        if: needs.setup.outputs.is-affected == 'true'
        timeout-minutes: 10
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          BROWSER: ${{ matrix.tests.project }}
        run: pnpm exec playwright test --config playwright.config.integration.ts --project ${{ matrix.tests.project }}
        working-directory: packages/browser
