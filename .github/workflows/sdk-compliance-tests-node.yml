name: Node SDK Compliance Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/node/**'
      - 'packages/core/**'
      - 'compliance/node/**'
      - '.github/workflows/sdk-compliance-tests-node.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/node/**'
      - 'packages/core/**'
      - 'compliance/node/**'
      - '.github/workflows/sdk-compliance-tests-node.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pull-requests: write

jobs:
  # Legacy /batch/ capture contract (capture_v0). Default capture mode.
  test-node-sdk:
    uses: PostHog/posthog-sdk-test-harness/.github/workflows/test-sdk-action.yml@8436fe6819bcccaafed426dba5fbf1865f65d16b
    with:
      adapter-dockerfile: compliance/node/Dockerfile
      adapter-context: .
      test-harness-version: "0.10.0"
      report-name: node-sdk-compliance-report

  # Capture V1 contract (capture_v1, POST /i/v1/analytics/events). Runs in
  # parallel with the v0 job; the v1 adapter image bakes POSTHOG_CAPTURE_MODE=v1
  # so the harness runs only the v1 contract against it. Kept alongside the v0
  # job while both capture modes ship dual for smoke testing.
  test-node-sdk-v1:
    uses: PostHog/posthog-sdk-test-harness/.github/workflows/test-sdk-action.yml@8436fe6819bcccaafed426dba5fbf1865f65d16b
    with:
      adapter-dockerfile: compliance/node/Dockerfile.v1
      adapter-context: .
      test-harness-version: "0.10.0"
      report-name: node-sdk-compliance-report-v1
