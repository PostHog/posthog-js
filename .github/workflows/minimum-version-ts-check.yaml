name: Minimum TypeScript version check

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  unit:
    name: Check minimum TS version
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [20, 22, 24]
        typescript-version:
          - version: "4.7.4"
            extra-flags: "--moduleResolution node"
          - version: "5.9.2"
            extra-flags: "--moduleResolution node"
          - version: "latest"
            extra-flags: "--moduleResolution node --ignoreConfig --ignoreDeprecations 6.0"
          - version: "6.0.0-dev.20251204"
            extra-flags: "--ignoreConfig"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/changed-files-classifier
        id: changes
        with:
          github-token: ${{ github.token }}

      - name: Skip heavy CI
        if: steps.changes.outputs.skip_heavy == 'true'
        run: echo "Skipping minimum TypeScript version check because all changed filenames and previous filenames are safe for heavy CI skip."

      - uses: ./.github/actions/setup
        if: steps.changes.outputs.run_heavy == 'true'
        with:
          node_version: ${{ matrix.node-version }}
          build: true

      # once its built we can see if we can use it on the forced version
      - name: Override TypeScript version
        if: steps.changes.outputs.run_heavy == 'true'
        env:
          TS_VERSION: ${{ matrix.typescript-version.version }}
        run: yq -i '.catalog.typescript = strenv(TS_VERSION)' pnpm-workspace.yaml && pnpm install --no-frozen-lockfile

      - name: Test TypeScript Import
        if: steps.changes.outputs.run_heavy == 'true'
        run: |
          rm ci-ts-file.js || true
          pnpm exec tsc --version
          pnpm exec tsc ci-ts-file.ts --strict --target es2017 --module commonjs --skipLibCheck ${{ matrix.typescript-version.extra-flags }}
          node ci-ts-file.js
        working-directory: packages/browser
