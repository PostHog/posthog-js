name: Minimum TypeScript version check

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Check minimum TS version
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [20, 22, 24]
        typescript-version:
          - version: "4.7.4"
            extra-flags: "--module commonjs --moduleResolution node"
          - version: "5.9.2"
            extra-flags: "--module commonjs --moduleResolution node"
          - version: "latest"
            extra-flags: "--module nodenext --moduleResolution nodenext --ignoreConfig"
          - version: "6.0.0-dev.20251204"
            extra-flags: "--module commonjs --ignoreConfig"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup
        with:
          node_version: ${{ matrix.node-version }}
          build: true

      # once it's built we can see if we can use it with the requested TypeScript version
      - name: Test TypeScript Import
        env:
          TS_VERSION: ${{ matrix.typescript-version.version }}
        run: |
          rm ci-ts-file.js || true
          pnpm --package="typescript@$TS_VERSION" dlx tsc --version
          pnpm --package="typescript@$TS_VERSION" dlx tsc ci-ts-file.ts --strict --target es2017 --skipLibCheck ${{ matrix.typescript-version.extra-flags }}
          node ci-ts-file.js
        working-directory: packages/browser
