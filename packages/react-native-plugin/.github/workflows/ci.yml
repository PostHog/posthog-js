name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint files
        run: pnpm lint

      - name: Typecheck files
        run: pnpm typecheck

  build-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build package
        run: pnpm prepare

  build-android:
    runs-on: ubuntu-latest
    env:
      TURBO_CACHE_DIR: .turbo/android
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache turborepo for Android
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-android-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-android-

      - name: Check turborepo cache for Android
        env:
          TURBO_TELEMETRY_DISABLED: 1
        run: |
          set +e
          # Get turbo output and extract just the JSON part (everything from first '{')
          TURBO_OUTPUT=$(pnpm turbo run build:android --cache-dir="${{ env.TURBO_CACHE_DIR }}" --dry=json 2>&1)
          TURBO_JSON=$(echo "$TURBO_OUTPUT" | sed -n '/^{/,$p')
          TURBO_CACHE_STATUS=$(echo "$TURBO_JSON" | jq -r '.tasks[] | select(.task == "build:android") | .cache.status' 2>/dev/null || echo "MISS")
          set -e

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Install JDK
        if: env.turbo_cache_hit != '1'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Finalize Android SDK
        if: env.turbo_cache_hit != '1'
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Cache Gradle
        if: env.turbo_cache_hit != '1'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build example for Android
        env:
          JAVA_OPTS: '-XX:MaxHeapSize=6g'
          TURBO_TELEMETRY_DISABLED: 1
        run: |
          pnpm turbo run build:android --cache-dir="${{ env.TURBO_CACHE_DIR }}"

  build-ios-static-lib:
    runs-on: macos-14-xlarge
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4 # v1
        with:
          xcode-version: latest-stable

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Setup
        uses: ./.github/actions/setup

      # do not cache cocoapods for now since we always depend on the latest version of the PostHog pod
      # - name: Cache cocoapods
      #   id: cocoapods-cache
      #   uses: actions/cache@v5
      #   with:
      #     path: |
      #       **/ios/Pods
      #     key: ${{ runner.os }}-cocoapods-${{ hashFiles('example/ios/Podfile.lock') }}
      #     restore-keys: |
      #       ${{ runner.os }}-cocoapods-

      # if: steps.cocoapods-cache.outputs.cache-hit != 'true'
      - name: Install cocoapods
        run: |
          cd example/ios
          pod install
        env:
          NO_FLIPPER: 1

      - name: Build example for iOS
        run: |
          cd example/ios
          set -o pipefail && xcrun xcodebuild -workspace PosthogReactNativePluginExample.xcworkspace -configuration Debug -scheme posthog-react-native-plugin -destination generic/platform=ios | xcpretty

  build-ios-spm:
    # Exercises the opt-in path: `posthog.useSpm` in Podfile.properties.json
    # routes posthog-ios through the React Native spm_dependency helper.
    # The SPM path requires dynamic frameworks. macos-26 uses the latest
    # Xcode shipped with the runner image.
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Setup
        uses: ./.github/actions/setup

      - name: Opt example into SPM resolution
        run: |
          cat > example/ios/Podfile.properties.json <<'JSON'
          {
            "posthog.useSpm": "true"
          }
          JSON

      - name: Install cocoapods
        run: |
          cd example/ios
          pod install
        env:
          NO_FLIPPER: 1
          USE_FRAMEWORKS: dynamic

      - name: Build example for iOS Simulator
        run: |
          cd example/ios
          xcodebuild -workspace PosthogReactNativePluginExample.xcworkspace -configuration Debug -scheme posthog-react-native-plugin -sdk iphonesimulator -destination 'generic/platform=iOS Simulator'
