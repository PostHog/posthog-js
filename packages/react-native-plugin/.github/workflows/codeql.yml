name: "CodeQL Advanced"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    permissions:
      actions: read # required by the CodeQL action
      contents: read # required for actions/checkout and CodeQL result upload
      security-events: write # for uploading CodeQL results
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
            runner: ubuntu-latest
          - language: actions
            build-mode: none
            runner: ubuntu-latest
          - language: swift
            build-mode: manual
            runner: macos-14-xlarge
          - language: java-kotlin
            build-mode: manual
            runner: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        if: ${{ matrix.language == 'swift' || matrix.language == 'java-kotlin' }}
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        if: ${{ matrix.language == 'swift' || matrix.language == 'java-kotlin' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        if: ${{ matrix.language == 'swift' || matrix.language == 'java-kotlin' }}
        run: pnpm install --frozen-lockfile

      - name: Install JDK
        if: ${{ matrix.language == 'java-kotlin' }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Finalize Android SDK
        if: ${{ matrix.language == 'java-kotlin' }}
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Install cocoapods
        if: ${{ matrix.language == 'swift' }}
        run: |
          cd example/ios
          pod install
        env:
          NO_FLIPPER: 1

      - name: Build iOS
        if: ${{ matrix.language == 'swift' }}
        run: |
          cd example/ios
          xcrun xcodebuild -workspace PosthogReactNativePluginExample.xcworkspace -configuration Debug -scheme posthog-react-native-plugin -destination generic/platform=ios | xcpretty

      - name: Build Android
        if: ${{ matrix.language == 'java-kotlin' }}
        env:
          JAVA_OPTS: '-XX:MaxHeapSize=6g'
        run: |
          cd example
          pnpm run build:android

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: '/language:${{matrix.language}}'
