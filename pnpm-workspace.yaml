packages:
  - packages/*
  - packages/rrweb/*
  - packages/rrweb/plugins/*
  - tooling/*
  - '!**/playground/**'
  - '!**/examples/**'

blockExoticSubdeps: true

catalog:
  '@babel/core': ^7.27.1
  '@babel/plugin-syntax-decorators': ^7.27.1
  '@babel/plugin-transform-exponentiation-operator': ^7.27.1
  '@babel/plugin-transform-nullish-coalescing-operator': ^7.27.1
  '@babel/plugin-transform-react-jsx': ^7.27.1
  '@babel/preset-env': ^7.27.1
  '@babel/preset-react': ^7.27.1
  '@babel/preset-typescript': ^7.27.1
  '@posthog/cli': ~0.7.21
  '@rslib/core': 0.10.6
  '@testing-library/dom': ^10.4.1
  '@testing-library/jest-dom': ^6.9.1
  '@testing-library/preact': ^3.2.4
  '@testing-library/react': ^16.3.0
  '@types/jest': ^29.5.14
  '@types/react': ^19.2.7
  esbuild-plugin-umd-wrapper: ^3.0.0
  jest: 29.7.0
  jest-environment-jsdom: ^29.7.0
  jest-environment-node: ^29.7.0
  jest-expo: ^47.0.1
  react: ^19.2.1
  react-dom: ^19.2.1
  react-test-renderer: ^19.2.1
  rollup: ^4.53.3
  ts-jest: 29.4.11
  tslib: ^2.5.0
  typescript: 5.8.2
  vite: ^6.2.0
  vite-plugin-dts: ^4.5.4

enableGlobalVirtualStore: true

minimumReleaseAge: 10080

allowBuilds:
  '@parcel/watcher': true
  '@posthog/cli': true
  core-js: true
  esbuild: true
  msw: true
  protobufjs: true
  puppeteer: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - sharp

overrides:
  node-forge: 1.3.2
  testcafe-browser-provider-browserstack>sharp: 0.34.5
  tough-cookie@4.0.0: 4.1.4

packageExtensions:
  tr46@0.0.3:
    dependencies:
      punycode: 2.3.1

minimumReleaseAgeExclude:
  - '@posthog/cli'
  - posthog-react-native-session-replay

supportedArchitectures:
  cpu: [x64, arm64v8, arm64]
  os: [linux, darwin]

trustPolicyExclude:
  - undici-types
  - ua-parser-js
  - semver
  - chokidar@4.0.3
  - css-declaration-sorter@6.4.1
  - eslint-config-prettier@8.10.2
  - semver@5.7.2
  - semver@6.3.1
  - ua-parser-js@0.7.40
  - ua-parser-js@1.0.40
  - undici-types@6.19.8
  - undici-types@6.21.0
  - vite@5.4.21

trustPolicy: no-downgrade

patchedDependencies:
  tr46@0.0.3: patches/tr46@0.0.3.patch
  tr46@2.1.0: patches/tr46@2.1.0.patch
  tr46@3.0.0: patches/tr46@3.0.0.patch
