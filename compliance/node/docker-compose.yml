services:
  sdk-adapter:
    build:
      context: ../..
      dockerfile: compliance/node/Dockerfile
    expose:
      - "8080"
    networks:
      - test-network

  test-harness:
    image: ghcr.io/posthog/sdk-test-harness:0.8.0
    command: ["run", "--adapter-url", "http://sdk-adapter:8080", "--mock-url", "http://test-harness:8081", "--sdk-type", "server", "--suite", "capture"]
    networks:
      - test-network
    depends_on:
      - sdk-adapter

networks:
  test-network:
    driver: bridge
