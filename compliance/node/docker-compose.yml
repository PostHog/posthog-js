services:
  sdk-adapter:
    build:
      context: ../..
      dockerfile: compliance/node/Dockerfile
    expose:
      - "8080"
    # Set POSTHOG_CAPTURE_MODE=v1 to run the Capture V1 contract locally; the
    # adapter then advertises capture_v1 and the harness selects the v1 suite.
    environment:
      - POSTHOG_CAPTURE_MODE=${POSTHOG_CAPTURE_MODE:-}
    networks:
      - test-network

  test-harness:
    image: ghcr.io/posthog/sdk-test-harness:0.10.0
    command: ["run", "--adapter-url", "http://sdk-adapter:8080", "--mock-url", "http://test-harness:8081"]
    networks:
      - test-network
    depends_on:
      - sdk-adapter

networks:
  test-network:
    driver: bridge
