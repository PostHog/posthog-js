apply plugin: 'com.android.library'

group = 'expo.modules.nativecrash'
version = '1.0.0'

def expoModulesCorePlugin = new File(project(":expo-modules-core").projectDir.absolutePath, "ExpoModulesCorePlugin.gradle")
apply from: expoModulesCorePlugin
applyKotlinExpoModulesCorePlugin()
// Adds `implementation project(':expo-modules-core')`, which provides the
// `expo.modules.kotlin.*` API (Module/ModuleDefinition/Name/Function).
useCoreDependencies()

// Manage the Android SDK versions ourselves, overridable by the root project.
buildscript {
  ext.safeExtGet = { prop, fallback ->
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
  }
}

project.android {
  compileSdkVersion safeExtGet("compileSdkVersion", 35)
  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 24)
    targetSdkVersion safeExtGet("targetSdkVersion", 34)
  }
}

android {
  namespace "expo.modules.nativecrash"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
  lintOptions {
    abortOnError false
  }
}
